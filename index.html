<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://brilliant-maroon-7qyv9qr1xg.edgeone.app/zl_icon_white_bg.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeelink — แพลตฟอร์มพอร์ตโฟลิโอเชิงสังคมสำหรับคนไทย</title>

    <!-- Fonts: IBM Plex Sans Thai (เนื้อหา) + IBM Plex Mono (กำกับ/เลข) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <style>
      /* ===== Claude Notebook Design — tokens ===== */
      :root{
        --paper:#F5F2EA; --rule:#E1DACB; --ink:#22252A; --ink-soft:#5B5E64;
        --blueprint:#3D5A80; --blueprint-soft:#3D5A801a;
        --redline:#A93F3F; --highlight:#E3A72E; --highlight-soft:#E3A72E22;
        --mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        --thai:'IBM Plex Sans Thai', -apple-system, 'Segoe UI', sans-serif;
        --maxw: 880px;
      }

      /* Light = กระดาษบันทึก */
      :root[data-theme="light"]{
        --bg-primary: var(--paper);
        --bg-secondary: #FBF9F4;
        --text-primary: var(--ink);
        --text-secondary: #2b2e33;
        --text-muted: var(--ink-soft);
        --glass-bg: #ffffff;
        --glass-border: var(--rule);
        --glass-shadow: rgba(34,37,42,0.08);
        --accent-cyan: var(--blueprint);
        --accent-purple: var(--highlight);
        --accent-pink: var(--redline);
        --accent-green: #4F7A4F;
        --accent-orange: var(--highlight);
        --accent-yellow: var(--highlight);
        --input-bg: #ffffff;
        --input-border: var(--rule);
        --input-text: var(--ink);
        --rule-color: var(--rule);
      }

      /* Dark = สมุดบันทึกกระดาษดำ */
      :root[data-theme="dark"]{
        --paper:#1c1f24; --rule:#2c3138;
        --bg-primary: #1c1f24;
        --bg-secondary: #23272d;
        --text-primary: #F5F2EA;
        --text-secondary: #E4E1D8;
        --text-muted: #A8ABB0;
        --glass-bg: #23272d;
        --glass-border: #2c3138;
        --glass-shadow: rgba(0,0,0,0.45);
        --accent-cyan: #7BA3C9;
        --accent-purple: var(--highlight);
        --accent-pink: #D98A8A;
        --accent-green: #88B386;
        --accent-orange: var(--highlight);
        --accent-yellow: var(--highlight);
        --input-bg: #23272d;
        --input-border: #2c3138;
        --input-text: #F5F2EA;
        --rule-color: #2c3138;
      }

      html, body { margin:0; padding:0; }
      body{
        font-family: var(--thai);
        background:
          repeating-linear-gradient(var(--bg-primary), var(--bg-primary) 39px, var(--rule-color) 40px);
        color: var(--text-primary);
        line-height:1.7;
        -webkit-font-smoothing:antialiased;
        min-height:100vh;
      }
      *{ box-sizing:border-box; }

      @media (prefers-reduced-motion: reduce){
        html{ scroll-behavior:auto; }
        *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
      }

      /* ===== Shared component classes (notebook restyle) ===== */
      .glass-card{
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        box-shadow: 0 2px 14px var(--glass-shadow);
      }
      .text-gradient-primary{ color: var(--text-primary); }
      .text-muted{ color: var(--text-muted) !important; }

      .hover-glow-cyan:hover,
      .hover-glow-purple:hover,
      .hover-glow-pink:hover,
      .hover-glow-green:hover{
        box-shadow: 0 0 0 3px var(--blueprint-soft);
        border-color: var(--blueprint);
      }
      .border-cyan{ border-color: var(--accent-cyan) !important; }
      .border-purple{ border-color: var(--accent-purple) !important; }
      .border-pink{ border-color: var(--accent-pink) !important; }
      .border-green{ border-color: var(--accent-green) !important; }
      .border-orange{ border-color: var(--accent-orange) !important; }
      .border-yellow{ border-color: var(--accent-yellow) !important; }

      /* Inputs */
      input, textarea, select{
        background-color: var(--input-bg) !important;
        border: 1px solid var(--input-border) !important;
        color: var(--input-text) !important;
        border-radius: 10px;
        padding: 10px 12px;
        font-family: var(--thai);
      }
      [data-theme="light"] input::placeholder,
      [data-theme="light"] textarea::placeholder{ color:#9a958a; }

      /* Scrollbar */
      ::-webkit-scrollbar{ width:9px; }
      ::-webkit-scrollbar-track{ background: var(--bg-secondary); }
      ::-webkit-scrollbar-thumb{ background: var(--glass-border); border-radius:5px; }
      ::-webkit-scrollbar-thumb:hover{ background: var(--text-muted); }

      /* Leaflet z-index fix */
      .leaflet-pane{ z-index:10; }
      .leaflet-top, .leaflet-bottom{ z-index:20; }

      /* ===== Notebook layout primitives (ใช้ใน Landing) ===== */
      .nb-rail{
        position:fixed; top:0; bottom:0; left:calc(50% - var(--maxw)/2 - 46px);
        width:1px; background: var(--text-primary); opacity:0.18;
      }
      @media (max-width:980px){ .nb-rail{ display:none; } }

      .nb-eyebrow{
        font-family: var(--mono); font-size:12.5px; letter-spacing:.10em;
        color: var(--blueprint); text-transform:uppercase; margin:0 0 18px;
      }
      .nb-h1{
        font-family: var(--thai); font-weight:700;
        font-size: clamp(34px,6vw,56px); line-height:1.12; margin:0 0 20px; letter-spacing:-0.01em;
      }
      .nb-lede{ font-size:18px; color: var(--text-muted); max-width:56ch; margin:0 0 8px; }

      .nb-step{
        position:relative; padding:54px 0 8px; max-width:var(--maxw); margin:0 auto;
        opacity:0; transform:translateY(14px); transition:opacity .6s ease, transform .6s ease;
      }
      .nb-step.in{ opacity:1; transform:translateY(0); }
      .nb-step-num{
        position:absolute; left:-92px; top:56px;
        font-family: var(--mono); font-size:13px; color: var(--blueprint); width:52px; text-align:right;
      }
      @media (max-width:980px){ .nb-step-num{ position:static; display:block; margin-bottom:10px; text-align:left; } }
      .nb-h2{ font-family: var(--thai); font-weight:700; font-size:24px; margin:0 0 14px; }
      .nb-body{ color: var(--text-muted); max-width:58ch; margin:0 0 22px; }

      .nb-card{
        border:1px solid var(--glass-border); background: var(--glass-bg);
        border-radius:14px; padding:28px 24px; box-shadow:0 2px 14px var(--glass-shadow);
        transition: box-shadow .25s ease, transform .25s ease;
      }
      .nb-card:hover{ box-shadow:0 0 0 3px var(--blueprint-soft); transform:translateY(-3px); }

      .nb-pin-card{ border:1px solid var(--glass-border); background: var(--glass-bg); border-radius:14px; padding:4px 22px; }
      .nb-pin-row{ display:flex; gap:18px; padding:15px 0; border-bottom:1px solid var(--glass-border); }
      .nb-pin-row:last-child{ border-bottom:none; }
      .nb-pin-label{ font-family: var(--mono); font-size:12px; color: var(--blueprint); min-width:140px; flex-shrink:0; padding-top:2px; }
      .nb-pin-value{ font-size:15px; }

      .nb-critique-list{ display:flex; flex-direction:column; gap:2px; margin:0 0 24px; }
      .nb-critique-item{ display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--glass-border); font-size:14.5px; align-items:flex-start; }
      .nb-tag{ font-family: var(--mono); font-size:10.5px; padding:2px 7px; flex-shrink:0; margin-top:2px; white-space:nowrap; border-radius:4px; }
      .nb-tag.cut{ background:#A93F3F14; color: var(--redline); }
      .nb-tag.keep{ background: var(--highlight-soft); color:#8a6512; }
      .nb-critique-item.cut .nb-text{ text-decoration:line-through; text-decoration-color: var(--redline); color: var(--text-muted); }
      .nb-critique-item.keep .nb-text{ font-weight:600; }

      .nb-btn{
        font-family: var(--mono); font-size:13px; padding:11px 22px; border-radius:10px;
        border:1px solid var(--text-primary); background:transparent; color:var(--text-primary);
        cursor:pointer; letter-spacing:.02em; transition: background .2s ease, color .2s ease;
        text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
      }
      .nb-btn:hover{ background: var(--blueprint-soft); }
      .nb-btn-primary{ background: var(--blueprint); color:#fff; border-color: var(--blueprint); }
      .nb-btn-primary:hover{ background:#2f4763; }
      .nb-btn:focus-visible{ outline:2px solid var(--blueprint); outline-offset:2px; }

      .nb-toggle-wrap{ display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
      .nb-toggle-btn{
        font-family: var(--mono); font-size:12.5px; padding:9px 18px; border:1px solid var(--text-primary);
        background:transparent; color:var(--text-primary); cursor:pointer; border-radius:8px;
      }
      .nb-toggle-btn.active{ background: var(--text-primary); color: var(--bg-primary); }

      .nb-demo-card{ border:1px solid var(--glass-border); padding:38px 32px; transition: background .35s ease, color .35s ease; background: var(--glass-bg); border-radius:14px; }
      .nb-demo-eyebrow{ font-family: var(--mono); font-size:11px; letter-spacing:.08em; margin-bottom:14px; color: var(--blueprint); text-transform:uppercase; }
      .nb-demo-title{ font-family: var(--thai); font-weight:700; font-size:26px; margin:0 0 10px; }
      .nb-demo-text{ font-size:14.5px; color: var(--text-muted); margin:0 0 20px; max-width:42ch; }

      .nb-footer{ max-width:var(--maxw); margin:0 auto; padding:40px 24px 90px; border-top:1px solid var(--glass-border); }
      .nb-footer-line{ font-size:14.5px; color: var(--text-muted); margin:0 0 10px; }
      .nb-signoff{ font-family: var(--mono); font-size:12.5px; color: var(--blueprint); }

      /* ===== Pixel / Retro landing (แยกจากธีมสมุดบันทึก) ===== */
      .pixel-landing{
        position:relative; min-height:100vh; color:#ECEAF6;
        font-family:'IBM Plex Sans Thai', sans-serif; overflow:hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(255,79,216,0.20), transparent 42%),
          radial-gradient(circle at 82% 28%, rgba(0,229,255,0.18), transparent 44%),
          linear-gradient(160deg, #161031 0%, #0c0a1f 55%, #1c0f30 100%);
      }
      .pixel-landing::before{
        content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
        background-image:
          linear-gradient(rgba(124,92,200,0.10) 1px, transparent 1px),
          linear-gradient(90deg, rgba(124,92,200,0.10) 1px, transparent 1px);
        background-size:42px 42px;
      }
      .pixel-landing::after{
        content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
        background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.16) 0 2px, transparent 2px 4px);
        mix-blend-mode:multiply;
      }
      .pixel-landing > *{ position:relative; z-index:2; }

      .pixel-font{ font-family:'Press Start 2P', monospace; }
      .pixel-h1{
        font-family:'Press Start 2P', monospace; font-size:clamp(26px,6vw,54px);
        line-height:1.3; color:#fff;
        text-shadow:0 0 14px rgba(0,229,255,0.55), 4px 4px 0 #ff4fd8;
      }
      .pixel-tag{ font-family:'Press Start 2P', monospace; font-size:12px; color:#00e5ff; letter-spacing:.12em; }
      .pixel-lede{ color:#c7c2e2; max-width:62ch; font-size:17px; line-height:1.7; }

      .pixel-btn{
        font-family:'Press Start 2P', monospace; font-size:12px; padding:15px 20px;
        border:3px solid #00e5ff; background:#00e5ff; color:#0c0a1f; cursor:pointer;
        box-shadow:4px 4px 0 #ff4fd8; transition:transform .12s ease, box-shadow .12s ease;
        text-decoration:none; display:inline-flex; align-items:center; gap:8px;
      }
      .pixel-btn:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 #ff4fd8; }
      .pixel-btn.alt{ background:transparent; color:#00e5ff; border-color:#ff4fd8; box-shadow:4px 4px 0 #00e5ff; }
      .pixel-btn.alt:hover{ box-shadow:7px 7px 0 #00e5ff; }

      .pixel-card{
        border:3px solid rgba(0,229,255,0.45); background:rgba(22,16,49,0.72);
        box-shadow:5px 5px 0 rgba(255,79,216,0.30); padding:22px; border-radius:0;
        transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      }
      .pixel-card:hover{ transform:translate(-3px,-3px); box-shadow:9px 9px 0 #ff4fd8; border-color:#00e5ff; }

      .pixel-card-cyan{ border-color:rgba(0,229,255,0.6); }
      .pixel-card-magenta{ border-color:rgba(255,79,216,0.6); }
      .pixel-card-green{ border-color:rgba(124,252,0,0.55); }

      /* pixel map of thailand */
      .pixel-map-wrap{ position:relative; display:inline-block; padding:10px; }
      .pixel-map{ display:grid; gap:3px; }
      .pixel-cell{ width:15px; height:15px; border-radius:2px; }
      .pixel-cell.land{ background:linear-gradient(135deg,#00e5ff,#7a5cff); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15); }
      .pixel-pin{
        position:absolute; width:13px; height:13px; border-radius:50%;
        background:#ffe600; box-shadow:0 0 12px 4px #ffe600; animation:pinpulse 1.6s ease-in-out infinite;
      }
      @keyframes pinpulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.7); opacity:.45; } }

      .float-deco{ position:absolute; z-index:1; font-size:30px; opacity:.85; animation:floaty 5s ease-in-out infinite; }
      @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-16px); } }

      /* dark retro navbar (เข้ากับหน้าแรก) */
      .pixel-nav{ background:rgba(12,10,31,0.92); border-bottom:2px solid #00e5ff; backdrop-filter:blur(6px); }
      .pixel-link{ color:#ECEAF6; padding:8px 12px; border-radius:0; transition:color .15s, text-shadow .15s; }
      .pixel-link:hover{ color:#00e5ff; text-shadow:0 0 8px #00e5ff; }
      .pixel-cta{ font-family:'Press Start 2P', monospace; font-size:11px; padding:10px 14px; border:2px solid #00e5ff; background:#00e5ff; color:#0c0a1f; box-shadow:3px 3px 0 #ff4fd8; text-decoration:none; display:inline-flex; align-items:center; }
      .pixel-cta:hover{ transform:translate(-1px,-1px); }
      .pixel-cta-alt{ font-family:'Press Start 2P', monospace; font-size:11px; padding:9px 13px; border:2px solid #ff4fd8; background:transparent; color:#ff4fd8; text-decoration:none; display:inline-flex; align-items:center; }
    </style>

    <!-- Tailwind CSS (layout utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: { sans: ['IBM Plex Sans Thai', 'sans-serif'] },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              'fade-in': 'fadeIn 0.5s ease-out',
              'scale-in': 'scaleIn 0.3s ease-out',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
            }
          }
        }
      }
    </script>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
      "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
      "leaflet": "https://esm.sh/leaflet@^1.9.4"
    }
  }
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
