    <style>
      /* ===== Zeelink — Claude orange / comfortable tokens ===== */
      :root{
        /* ===== Brand roles (5 roles ตาม Blueprint) ===== */
        --paper: #FBF7F0;          /* Paper: พื้นอุ่น (light) */
        --ink: #1F1B16;            /* Ink: ตัวอักษรหลัก */
        --blueprint: #2f4763;       /* Blueprint: accent/navy สำหรับ eyebrow + focus */
        --blueprint-soft: #2f47631a; /* Blueprint soft: hover/selection */
        --redline: #A93F3F;        /* Redline: ตัด/เตือน */
        --highlight: #E8B23D;       /* Highlight: เน้นสำคัญ */
        --highlight-soft: #E8B23D1a;

        /* ===== Brand colors ===== */
        --orange:#FF7A2F; --orange-deep:#E8651E; --orange-soft:#FF7A2F26;
        --blue:#3D7DD6; --yellow:#E8B23D; --pink:#E36B9B; --green:#4F9D69;

        /* ===== Typography ===== */
        --font-display:'IBM Plex Sans Thai', sans-serif;
        --font-body:'IBM Plex Sans Thai', sans-serif;
        --font-mono:'IBM Plex Mono', ui-monospace, monospace;
        --font-pixel:'Press Start 2P', monospace;
        --thai:'IBM Plex Sans Thai', -apple-system, 'Segoe UI', sans-serif;

        /* Type scale (12/14/16/20/24/32/48) */
        --fs-xs:12px; --fs-sm:14px; --fs-base:16px; --fs-lg:20px;
        --fs-xl:24px; --fs-xxl:32px; --fs-xxxl:48px;
        --lh-tight:1.15; --lh-normal:1.5; --lh-relaxed:1.6;

        /* ===== Spacing scale (4px baseline) ===== */
        --sp-xs:4px; --sp-sm:8px; --sp-md:12px; --sp-lg:16px;
        --sp-xl:24px; --sp-xxl:32px; --sp-xxxl:48px; --sp-xxxxl:64px;

        /* ===== Radius / Elevation ===== */
        --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:20px;
        --shadow-sm:0 1px 4px rgba(31,27,22,0.08);
        --shadow-md:0 2px 14px rgba(31,27,22,0.12);
        --shadow-lg:0 8px 32px rgba(31,27,22,0.18);

        /* ===== Motion ===== */
        --motion-fast:0.15s ease; --motion-base:0.25s ease; --motion-slow:0.4s ease;

        --maxw: 1100px;
      }

      /* Light = ครีมอุ่น + ส้ม (สบายตา) */
      :root[data-theme="light"]{
        --bg-primary: #FBF7F0;
        --bg-secondary: #FFFFFF;
        --text-primary: #1F1B16;
        --text-secondary: #3a342c;
        --text-muted: #7A7163;
        --glass-bg: #FFFFFF;
        --glass-border: #ECE3D6;
        --glass-shadow: rgba(31,27,22,0.08);
        --accent-cyan: var(--orange);
        --accent-purple: var(--yellow);
        --accent-pink: var(--pink);
        --accent-green: var(--green);
        --accent-orange: var(--orange);
        --accent-yellow: var(--yellow);
        --input-bg: #FFFFFF;
        --input-border: #ECE3D6;
        --input-text: #1F1B16;
        --rule-color: #ECE3D6;
      }

      /* Dark = ดำอุ่น + ส้ม (สบายตา) */
      :root[data-theme="dark"]{
        --bg-primary: #161412;
        --bg-secondary: #211E1A;
        --text-primary: #F3EDE4;
        --text-secondary: #E4DDD2;
        --text-muted: #B0A697;
        --glass-bg: #211E1A;
        --glass-border: #322D27;
        --glass-shadow: rgba(0,0,0,0.4);
        --accent-cyan: var(--orange);
        --accent-purple: var(--yellow);
        --accent-pink: var(--pink);
        --accent-green: #6FB98A;
        --accent-orange: var(--orange);
        --accent-yellow: var(--yellow);
        --input-bg: #211E1A;
        --input-border: #322D27;
        --input-text: #F3EDE4;
        --rule-color: #322D27;
      }

      html, body { margin:0; padding:0; }
      body{
        font-family: var(--thai);
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height:1.7;
        -webkit-font-smoothing:antialiased;
        min-height:100vh;
      }
      /* ลายเส้นสมุด — เก็บเฉพาะหน้า landing/login (หน้าที่ใช้งานหนักเช่น ฟีด/แดชบอร์ด เป็นพื้นเรียบเพื่ออ่านสบายตา) */
      .nb-page-bg{
        background:
          repeating-linear-gradient(var(--bg-primary), var(--bg-primary) 39px, var(--rule-color) 40px);
      }
      *{ box-sizing:border-box; }

      @media (prefers-reduced-motion: reduce){
        html{ scroll-behavior:auto; }
        *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
      }

      /* ===== Shared component classes (notebook restyle) ===== */
      .glass-card{
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        box-shadow: 0 2px 14px var(--glass-shadow);
      }
      .text-gradient-primary{ color: var(--text-primary); }
      .text-muted{ color: var(--text-muted) !important; }

      .hover-glow-cyan:hover,
      .hover-glow-purple:hover,
      .hover-glow-pink:hover,
      .hover-glow-green:hover{
        box-shadow: 0 0 0 3px var(--blueprint-soft);
        border-color: var(--blueprint);
      }
      .border-cyan{ border-color: var(--accent-cyan) !important; }
      .border-purple{ border-color: var(--accent-purple) !important; }
      .border-pink{ border-color: var(--accent-pink) !important; }
      .border-green{ border-color: var(--accent-green) !important; }
      .border-orange{ border-color: var(--accent-orange) !important; }
      .border-yellow{ border-color: var(--accent-yellow) !important; }

      /* Inputs */
      input, textarea, select{
        background-color: var(--input-bg) !important;
        border: 1px solid var(--input-border) !important;
        color: var(--input-text) !important;
        border-radius: 10px;
        padding: 10px 12px;
        font-family: var(--thai);
      }
      [data-theme="light"] input::placeholder,
      [data-theme="light"] textarea::placeholder{ color:#9a958a; }

      /* Scrollbar */
      ::-webkit-scrollbar{ width:9px; }
      ::-webkit-scrollbar-track{ background: var(--bg-secondary); }
      ::-webkit-scrollbar-thumb{ background: var(--glass-border); border-radius:5px; }
      ::-webkit-scrollbar-thumb:hover{ background: var(--text-muted); }

      /* Leaflet z-index fix */
      .leaflet-pane{ z-index:10; }
      .leaflet-top, .leaflet-bottom{ z-index:20; }

      /* ===== Vibrant illustrated Thai map (Amazing Thailand feel) ===== */
      .thai-map-vibrant .leaflet-tile-pane{
        filter: saturate(1.35) contrast(1.05) brightness(1.03) hue-rotate(-4deg);
      }
      .thai-map-vibrant .leaflet-container{ background:#aadaff; }
      .landmark-icon{ background:transparent; border:none; }

      /* ===== Notebook layout primitives (ใช้ใน Landing) ===== */
      .nb-rail{
        position:fixed; top:0; bottom:0; left:calc(50% - var(--maxw)/2 - 46px);
        width:1px; background: var(--text-primary); opacity:0.18;
      }
      @media (max-width:980px){ .nb-rail{ display:none; } }

      .nb-eyebrow{
        font-family: var(--font-mono); font-size:12.5px; letter-spacing:.10em;
        color: var(--blueprint); text-transform:uppercase; margin:0 0 18px;
      }
      .nb-h1{
        font-family: var(--thai); font-weight:700;
        font-size: clamp(34px,6vw,56px); line-height:1.12; margin:0 0 20px; letter-spacing:-0.01em;
      }
      .nb-lede{ font-size:18px; color: var(--text-muted); max-width:56ch; margin:0 0 8px; }

      .nb-step{
        position:relative; padding:54px 0 8px; max-width:var(--maxw); margin:0 auto;
        opacity:0; transform:translateY(14px); transition:opacity .6s ease, transform .6s ease;
      }
      .nb-step.in{ opacity:1; transform:translateY(0); }
      .nb-step-num{
        position:absolute; left:-92px; top:56px;
        font-family: var(--font-mono); font-size:13px; color: var(--blueprint); width:52px; text-align:right;
      }
      @media (max-width:980px){ .nb-step-num{ position:static; display:block; margin-bottom:10px; text-align:left; } }
      .nb-h2{ font-family: var(--thai); font-weight:700; font-size:24px; margin:0 0 14px; }
      .nb-body{ color: var(--text-muted); max-width:58ch; margin:0 0 22px; }

      .nb-card{
        border:1px solid var(--glass-border); background: var(--glass-bg);
        border-radius:14px; padding:28px 24px; box-shadow:0 2px 14px var(--glass-shadow);
        transition: box-shadow .25s ease, transform .25s ease;
      }
      .nb-card:hover{ box-shadow:0 0 0 3px var(--blueprint-soft); transform:translateY(-3px); }

      .nb-pin-card{ border:1px solid var(--glass-border); background: var(--glass-bg); border-radius:14px; padding:4px 22px; }
      .nb-pin-row{ display:flex; gap:18px; padding:15px 0; border-bottom:1px solid var(--glass-border); }
      .nb-pin-row:last-child{ border-bottom:none; }
      .nb-pin-label{ font-family: var(--font-mono); font-size:12px; color: var(--blueprint); min-width:140px; flex-shrink:0; padding-top:2px; }
      .nb-pin-value{ font-size:15px; }

      .nb-critique-list{ display:flex; flex-direction:column; gap:2px; margin:0 0 24px; }
      .nb-critique-item{ display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--glass-border); font-size:14.5px; align-items:flex-start; }
      .nb-tag{ font-family: var(--font-mono); font-size:10.5px; padding:2px 7px; flex-shrink:0; margin-top:2px; white-space:nowrap; border-radius:4px; }
      .nb-tag.cut{ background:#A93F3F14; color: var(--redline); }
      .nb-tag.keep{ background: var(--highlight-soft); color:#8a6512; }
      .nb-critique-item.cut .nb-text{ text-decoration:line-through; text-decoration-color: var(--redline); color: var(--text-muted); }
      .nb-critique-item.keep .nb-text{ font-weight:600; }

      .nb-btn{
        font-family: var(--font-mono); font-size:13px; padding:11px 22px; border-radius:10px;
        border:1px solid var(--text-primary); background:transparent; color:var(--text-primary);
        cursor:pointer; letter-spacing:.02em; transition: background .2s ease, color .2s ease;
        text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
      }
      .nb-btn:hover{ background: var(--blueprint-soft); }
      .nb-btn-primary{ background: var(--blueprint); color:#fff; border-color: var(--blueprint); }
      .nb-btn-primary:hover{ background:#2f4763; }
      .nb-btn:focus-visible{ outline:2px solid var(--blueprint); outline-offset:2px; }

      .nb-toggle-wrap{ display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
      .nb-toggle-btn{
        font-family: var(--font-mono); font-size:12.5px; padding:9px 18px; border:1px solid var(--text-primary);
        background:transparent; color:var(--text-primary); cursor:pointer; border-radius:8px;
      }
      .nb-toggle-btn.active{ background: var(--text-primary); color: var(--bg-primary); }

      .nb-demo-card{ border:1px solid var(--glass-border); padding:38px 32px; transition: background .35s ease, color .35s ease; background: var(--glass-bg); border-radius:14px; }
      .nb-demo-eyebrow{ font-family: var(--font-mono); font-size:11px; letter-spacing:.08em; margin-bottom:14px; color: var(--blueprint); text-transform:uppercase; }
      .nb-demo-title{ font-family: var(--thai); font-weight:700; font-size:26px; margin:0 0 10px; }
      .nb-demo-text{ font-size:14.5px; color: var(--text-muted); margin:0 0 20px; max-width:42ch; }

      .nb-footer{ max-width:var(--maxw); margin:0 auto; padding:40px 24px 90px; border-top:1px solid var(--glass-border); }
      .nb-footer-line{ font-size:14.5px; color: var(--text-muted); margin:0 0 10px; }
      .nb-signoff{ font-family: var(--font-mono); font-size:12.5px; color: var(--blueprint); }

      /* ===== Zeelink landing — orange / comfortable (theme-aware) ===== */
      .pixel-landing{
        position:relative; min-height:100vh; color:var(--text-primary);
        font-family:'IBM Plex Sans Thai', sans-serif; overflow:hidden;
        background:
          radial-gradient(circle at 18% 12%, var(--orange-soft), transparent 42%),
          radial-gradient(circle at 82% 28%, rgba(61,125,214,0.10), transparent 44%),
          linear-gradient(160deg, var(--bg-secondary) 0%, var(--bg-primary) 60%, var(--bg-secondary) 100%);
      }
      .pixel-landing::before{
        content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
        background-image:
          linear-gradient(var(--glass-border) 1px, transparent 1px),
          linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
        background-size:42px 42px; opacity:0.6;
      }
      .pixel-landing::after{
        content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
        background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.04) 0 2px, transparent 2px 4px);
      }
      .pixel-landing > *{ position:relative; z-index:2; }

      .pixel-font{ font-family:'Press Start 2P', monospace; }
      .pixel-h1{
        font-family:'Press Start 2P', monospace; font-size:clamp(26px,6vw,54px);
        line-height:1.3; color:var(--text-primary);
        text-shadow:0 0 12px var(--orange-soft), 3px 3px 0 var(--orange);
      }
      .pixel-tag{ font-family:'Press Start 2P', monospace; font-size:12px; color:var(--orange); letter-spacing:.12em; }
      .pixel-lede{ color:var(--text-muted); max-width:62ch; font-size:17px; line-height:1.7; }

      .pixel-btn{
        font-family:'Press Start 2P', monospace; font-size:12px; padding:15px 20px;
        border:3px solid var(--orange); background:var(--orange); color:#fff; cursor:pointer;
        box-shadow:4px 4px 0 var(--text-primary); transition:transform .12s ease, box-shadow .12s ease;
        text-decoration:none; display:inline-flex; align-items:center; gap:8px;
      }
      .pixel-btn:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--text-primary); }
      .pixel-btn.alt{ background:transparent; color:var(--orange); border-color:var(--text-primary); box-shadow:4px 4px 0 var(--orange); }
      .pixel-btn.alt:hover{ box-shadow:7px 7px 0 var(--orange); }

      .pixel-card{
        border:3px solid var(--orange); background:var(--glass-bg);
        box-shadow:5px 5px 0 rgba(31,27,22,0.12); padding:22px; border-radius:0;
        transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      }
      .pixel-card:hover{ transform:translate(-3px,-3px); box-shadow:9px 9px 0 var(--orange); }

      .pixel-card-cyan{ border-color:var(--blue); }
      .pixel-card-magenta{ border-color:var(--pink); }
      .pixel-card-green{ border-color:var(--green); }

      /* pixel map of thailand */
      .pixel-map-wrap{ position:relative; display:inline-block; }
      .pixel-map{ display:grid; gap:3px; }
      .pixel-cell{ width:15px; height:15px; border-radius:2px; }
      .pixel-cell.land{ background:linear-gradient(135deg,var(--orange),#FFB066); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15); }
      .pixel-pin{
        position:absolute; width:13px; height:13px; border-radius:50%;
        background:var(--yellow); box-shadow:0 0 12px 4px var(--yellow); animation:pinpulse 1.6s ease-in-out infinite;
      }
      @keyframes pinpulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.7); opacity:.45; } }

      .float-deco{ position:absolute; z-index:1; font-size:30px; opacity:.85; animation:floaty 5s ease-in-out infinite; }
      @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-16px); } }

      /* Scroll-reveal: เลือนส่วนเข้ามาตอนเลื่อนถึง (หน้าที่ = ชี้นำความสนใจ) */
      .reveal{ opacity:0; transform:translateY(28px); transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
      .reveal.in{ opacity:1; transform:translateY(0); }
      /* Hero โผล่ทันที (ไม่ต้องรอ scroll) */
      .reveal.in{ transition-delay:0s; }
      @media (prefers-reduced-motion: reduce){ .reveal{ opacity:1; transform:none; } }

      /* ===== AiMascot (ตัวการ์ตูนน่ารัก — CSS animation เท่านั้น ไม่หน่วง) ===== */
      @keyframes mascotBob {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50% { transform: translateY(-7px) rotate(1deg); }
      }
      @keyframes mascotFloat {
        0%, 100% { transform: translateY(0); opacity: 0.92; }
        50% { transform: translateY(-6px); opacity: 1; }
      }

      /* ข้อความลอยเด้งไปมาแนวตั้ง+แนวนอนบนหน้า Login (ใช้ --dx สำหรับเลื่อนข้าง) */
      @keyframes bobUpDown {
        0%   { transform: translate(var(--dx, 0), 10px) rotate(-3deg); opacity: 0; }
        12%  { opacity: 0.9; }
        30%  { transform: translate(calc(var(--dx, 0px) * -0.5), -18px) rotate(2deg); }
        50%  { transform: translate(var(--dx, 0), -30px) rotate(-2deg); opacity: 1; }
        70%  { transform: translate(calc(var(--dx, 0px) * -0.4), -14px) rotate(3deg); }
        88%  { opacity: 0.9; }
        100% { transform: translate(var(--dx, 0), 10px) rotate(-3deg); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce){
        [style*="mascotBob"], [style*="mascotFloat"]{ animation: none !important; }
      }

      /* navbar (เข้ากับหน้าแรก) */
      .pixel-nav{ background:var(--glass-bg); border-bottom:2px solid var(--orange); backdrop-filter:blur(6px); }
      .pixel-link{ color:var(--text-primary); padding:8px 12px; border-radius:0; transition:color .15s, text-shadow .15s; }
      .pixel-link:hover{ color:var(--orange); text-shadow:0 0 8px var(--orange-soft); }
      .pixel-cta{ font-family:'Press Start 2P', monospace; font-size:11px; padding:10px 14px; border:2px solid var(--orange); background:var(--orange); color:#fff; box-shadow:3px 3px 0 var(--text-primary); text-decoration:none; display:inline-flex; align-items:center; }
      .pixel-cta:hover{ transform:translate(-1px,-1px); }
      .pixel-cta-alt{ font-family:'Press Start 2P', monospace; font-size:11px; padding:9px 13px; border:2px solid var(--text-primary); background:transparent; color:var(--text-primary); text-decoration:none; display:inline-flex; align-items:center; }

      /* ===== A11y: โฟกัสชัดเจนสำหรับคีย์บอร์ด (ถูกใจคนใช้เทคโนิโลยีช่วย) ===== */
      :focus-visible{ outline:2px solid var(--orange); outline-offset:2px; border-radius:2px; }
      /* ลดอนิเมชั่นสำหรับผู้ใช้ที่ตั้งระบบไว้ (ไม่ให้วิงเวียน/เมื่อยล้า) */
      @media (prefers-reduced-motion: reduce){
        *, *::before, *::after{
          animation-duration:0.001ms !important;
          animation-iteration-count:1 !important;
          transition-duration:0.001ms !important;
          scroll-behavior:auto !important;
        }
      }

      /* ===== Toast / Snackbar notifications (plan #2) ===== */
      .zee-toast{
        display:flex; align-items:flex-start; gap:10px;
        background: var(--glass-bg); border:1px solid var(--glass-border);
        border-left:4px solid var(--orange);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding:12px 14px; color: var(--text-primary);
        font-family: var(--font-body);
        animation: toastIn .28s cubic-bezier(.2,.7,.2,1) both;
      }
      .zee-toast-icon{ flex-shrink:0; margin-top:1px; line-height:0; }
      .zee-toast-title{ font-weight:700; font-size:13px; margin:0 0 2px; color: var(--text-primary); }
      .zee-toast-msg{ font-size:13px; opacity:.88; line-height:1.45; margin:0; color: var(--text-primary); }
      .zee-toast-close{ flex-shrink:0; opacity:.5; cursor:pointer; background:none; border:none; color:inherit; padding:2px; border-radius:6px; line-height:0; transition: opacity .15s ease, background-color .15s ease; }
      .zee-toast-close:hover{ opacity:1; background: var(--glass-border); }
      @keyframes toastIn{ from{ transform:translateX(120%); opacity:0; } to{ transform:translateX(0); opacity:1; } }

      /* ===== Skeleton loading (plan #1) ===== */
      .zee-skel{
        display:block; border-radius:8px;
        background: linear-gradient(90deg, var(--glass-border) 25%, var(--glass-bg) 37%, var(--glass-border) 63%);
        background-size: 400% 100%;
        animation: skelShimmer 1.4s ease infinite;
      }
      @keyframes skelShimmer{ 0%{ background-position:100% 0; } 100%{ background-position:0 0; } }

      /* ===== Like heart pop (plan #8) ===== */
      .zee-heart-pop{ animation: heartPop .42s ease; transform-origin:center; }
      @keyframes heartPop{ 0%{ transform:scale(1);} 30%{ transform:scale(1.45);} 55%{ transform:scale(.85);} 100%{ transform:scale(1);} }

      /* ===== Smooth theme switch (plan #6) ===== */
      body, .glass-card{
        transition: background-color .3s ease, color .3s ease, border-color .3s ease;
      }

      @media (prefers-reduced-motion: reduce){
        .zee-toast, .zee-skel{ animation:none; }
        .zee-skel{ background: var(--glass-border); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
